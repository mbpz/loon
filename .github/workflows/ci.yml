name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Unit test
        run: cargo test --workspace
      - name: Doc test
        run: cargo test --doc -p loon-core -p loon-sdk -p loon-engine -p loon-emission -p loon-persistence -p loon-nlp -p loon-app-modules -p loon-server -p loon
      - name: Doc (no-deps)
        run: cargo doc --workspace --no-deps